<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_15 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_15" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_15');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const containerWidth = container.clientWidth || window.innerWidth;
const containerHeight = container.clientHeight || window.innerHeight;

const camera = new THREE.PerspectiveCamera(75, containerWidth / containerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(containerWidth, containerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create a premium "AI Core" geometry - a nested wireframe sphere
const outerGeo = new THREE.IcosahedronGeometry(2, 2);
const outerMat = new THREE.MeshPhongMaterial({
    color: 0x2563EB,
    wireframe: true,
    transparent: true,
    opacity: 0.3
});
const outerSphere = new THREE.Mesh(outerGeo, outerMat);
scene.add(outerSphere);

const innerGeo = new THREE.IcosahedronGeometry(1.2, 1);
const innerMat = new THREE.MeshPhongMaterial({
    color: 0x111827,
    emissive: 0x2563EB,
    emissiveIntensity: 0.5,
    wireframe: true
});
const innerSphere = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerSphere);

const light = new THREE.PointLight(0xffffff, 1, 100);
light.position.set(10, 10, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

function animate() {
    requestAnimationFrame(animate);
    
    outerSphere.rotation.y += 0.002;
    outerSphere.rotation.x += 0.001;
    
    innerSphere.rotation.y -= 0.004;
    innerSphere.rotation.z += 0.002;
    
    // Subtle float
    const time = Date.now() * 0.001;
    outerSphere.position.y = Math.sin(time) * 0.1;
    innerSphere.position.y = Math.sin(time + 1) * 0.05;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_15 -->
</body>
</html>
